name: Firebase CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            admin-web/package-lock.json
            backend/functions/package-lock.json

      - name: 🌐 Install dependencies & Build Admin Web
        working-directory: ./admin-web
        run: |
          npm ci
          npm run build

      - name: 🚀 Install Functions dependencies
        working-directory: ./backend/functions
        run: |
          npm ci

      - name: 🛠️ Install Firebase CLI
        run: npm install -g firebase-tools

      - name: ☁️ Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          # Write the secret JSON to a temporary file
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp_key.json
          # Tell Firebase CLI to use this service account key for authentication
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json
          firebase deploy --project dhanyavahini-4d360 --non-interactive
