name: Firebase CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            admin-web/package-lock.json
            backend/functions/package-lock.json

      - name: 🌐 Install dependencies & Build Admin Web
        working-directory: ./admin-web
        run: |
          npm ci
          npm run build

      - name: 🚀 Install Functions dependencies
        working-directory: ./backend/functions
        run: |
          npm ci

      - name: 🛠️ Install Firebase CLI
        run: npm install -g firebase-tools

      - name: ☁️ Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --project dhanyavahini-4d360 --token "$FIREBASE_TOKEN" --non-interactive
